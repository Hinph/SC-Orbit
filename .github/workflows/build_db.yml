---
name: Build Custom Database

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: write-all

jobs:
  build_db:
    runs-on: ubuntu-latest
    steps:
      - name: Build Custom Database for MiSTer Downloader
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FINDER_IGNORE: Linux Mister src LICENSE Makefile
        run: |
          set -o pipefail
          curl --fail --location https://raw.githubusercontent.com/theypsilon/Downloader_DB-Template_MiSTer/main/.github/build_db.py | python3 -
